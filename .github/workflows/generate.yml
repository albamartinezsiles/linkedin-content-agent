name: Generate LinkedIn Post

on:
  schedule:
    # L/X/V a las 06:30 UTC = 07:30 Madrid en invierno, 08:30 en verano
    - cron: '30 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # para commitear state.json
      issues: write     # para crear el issue con el post

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Generate post and carousel
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID:    ${{ github.run_id }}
          PROFILE_YAML:     ${{ secrets.PROFILE_YAML }}
        run: python src/generate.py

      - name: Upload carousel PNGs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-carousel-${{ github.run_id }}
          path: build/*.png
          retention-days: 90

      - name: Commit state.json
        run: |
          git config user.name  "linkedin-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add config/state.json
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%d)"
          git push || true
