# ============================================================================
# Configuración pública del agente — pilares, voz, reglas
# ============================================================================

voice:
  style: "directo, técnico pero accesible, opinado con fundamento, cero corporate"
  length_chars: [1000, 1500]
  hashtags_count: [3, 5]
  technical_level: >
    Nivel 'dev con 3 años': el lector sabe HTML/CSS/JS, React básico, qué es una API,
    qué es Git, qué es un framework. NO asume: Server Components, Suspense, Edge
    runtime, WebAssembly, detalles de algoritmos de caché, compilers internals.
    Cuando aparezca un término específico o nuevo, explícalo en 1 frase.
    No uses inglés innecesariamente, pero sí nombres propios (Next.js, Vite, Astro).

  avoid:
    - "En el mundo actual..."
    - "En la era digital..."
    - "¿Sabías que...?"
    - "Muchos se preguntan..."
    - '"¿Qué opinas?" como cierre genérico'
    - "emojis decorativos (cohetes, fueguitos, manitas)"
    - "palabras que huelen a IA: crucial, en definitiva, revolucionario, fundamental"
    - "frases motivacionales vacías"
    - "listas de 10 items, formato clickbait"
    - "reflexiones abstractas sin datos ni ejemplos concretos"

  do:
    - "Abrir citando un hecho concreto, cifra o noticia reciente con fuente"
    - "Usar nombres propios: herramientas, versiones, autores, blogs"
    - "Frases cortas, líneas separadas por saltos de línea (legibilidad móvil)"
    - "Dar opinión firme cuando la tengas, admitir dudas cuando no"
    - "Cerrar con una pregunta concreta o con una postura clara"
    - "Incluir al menos un ejemplo de código, stack concreto o caso real"

# ============================================================================
# PILARES — rediseñados con densidad técnica alta
# ============================================================================

pillars:

  - id: frontend_modern
    name: "Frontend moderno"
    weight: 1
    angle: >
      Novedades reales del ecosistema frontend: releases de Next.js, Astro, Vite,
      React, Svelte, Vue, Tailwind, Bun, Biome, build tools. Fallos conocidos de
      frameworks populares, decisiones de arquitectura con impacto medible,
      herramientas emergentes que merecen atención. Post tipo "ha salido X, esto es
      lo que cambia y mi opinión", no tutorial básico.
    search_queries:
      - "Next.js release"
      - "Astro release notes"
      - "Vite release"
      - "React 19 update"
      - "Tailwind CSS update"
      - "frontend news this week"
    good_sources:
      - "vercel.com/blog"
      - "astro.build/blog"
      - "github.com releases pages"
      - "css-tricks.com"
      - "smashingmagazine.com"
      - "web.dev"
    example_hooks:
      - "React 19 llega estable y nadie está hablando del cambio que más te va a afectar."
      - "Llevo una semana con Astro 5 en producción. Esto es lo que no te dicen en la documentación."
      - "Vite 6 cambió cómo trata las variables de entorno. Si no lo sabes, tus builds rompen en silencio."

  - id: wordpress_pro
    name: "WordPress profesional"
    weight: 1
    angle: >
      WordPress a nivel pro, que nadie cuenta en YouTube. Novedades de core
      (releases 6.x), performance real (Core Web Vitals, LCP, CLS), LiteSpeed
      Cache, fixes oscuros de temas profesionales como Enfold o Divi, block themes,
      integración con Tailwind. Post tipo "he resuelto X bug de producción" o
      "sale versión Y de WP y esto significa...".
    search_queries:
      - "WordPress release"
      - "Gutenberg update"
      - "Core Web Vitals WordPress"
      - "LiteSpeed Cache release"
      - "WordPress performance 2026"
      - "Enfold theme update"
    good_sources:
      - "wordpress.org/news"
      - "make.wordpress.org/core"
      - "web.dev"
      - "kinsta.com/blog"
      - "wpbeaverbuilder.com/blog"
    example_hooks:
      - "WordPress 6.8 cambió cómo se cargan las fuentes. El 80% de los sitios perdieron puntos de LCP sin enterarse."
      - "Llevo 3 horas debuggeando un problema de LiteSpeed que no era de LiteSpeed."
      - "Hay un fix de una línea para el bug más común de Enfold + Gutenberg. Lleva meses sin documentarse."

  - id: ai_for_devs
    name: "IA aplicada al trabajo de dev"
    weight: 1
    angle: >
      Cómo usar IA para ser MÁS dev, no menos. Novedades de Claude, Cursor,
      Copilot, agentes, MCPs, Gemini CLI. Workflows reales con nombres propios
      y métricas concretas. Casos donde la IA falla y por qué. Post tipo
      "ha salido X modelo/herramienta, mi experiencia real" o "así he automatizado Y
      con código que puedes copiar".
    search_queries:
      - "Claude release Anthropic"
      - "Cursor new feature"
      - "AI coding tools 2026"
      - "MCP server release"
      - "GitHub Copilot update"
      - "AI agents developers"
    good_sources:
      - "anthropic.com/news"
      - "cursor.com/blog"
      - "github.blog"
      - "simonwillison.net"
      - "news.ycombinator.com"
    example_hooks:
      - "Claude Sonnet 4.5 salió ayer. Lo he probado en mi workflow real y esto es lo que cambia."
      - "Llevo 2 meses con Cursor Composer. Ha cambiado mi forma de debuggear, no de escribir código."
      - "Monté un agente para automatizar mis posts de LinkedIn. El código está en GitHub, te cuento cómo funciona."

  - id: web_performance
    name: "Performance web y UX técnico"
    weight: 1
    angle: >
      Intersección entre frontend, UX y performance medido. Core Web Vitals,
      accesibilidad real (WCAG AA en vida real, no auditorías de mentira),
      técnicas de optimización concretas (lazy loading, prefetching, fonts,
      imágenes), debates sobre diseño que importan al negocio. Post tipo
      "cambié X y el LCP bajó Y ms" o "esta técnica de CSS se ha infravalorado".
    search_queries:
      - "Core Web Vitals 2026"
      - "web performance news"
      - "LCP optimization"
      - "WCAG update"
      - "CSS new feature"
      - "accessibility web update"
    good_sources:
      - "web.dev"
      - "developer.mozilla.org/blog"
      - "smashingmagazine.com"
      - "css-tricks.com"
      - "a11yproject.com"
    example_hooks:
      - "Google cambió cómo se mide INP en marzo. Lo revisé en 5 proyectos reales y esto es lo que encontré."
      - "Self-hostear Google Fonts no es solo privacidad. Son 180ms de LCP que estás regalando."
      - "El 90% de los modales en producción son trampas de accesibilidad. Aquí tienes el fix real."

  - id: career_women_tech
    name: "Carrera, soft skills, mujer en tech"
    weight: 0.3
    angle: >
      Pilar de baja frecuencia. SOLO usar cuando haya una noticia real (informe,
      estudio, polémica del sector) que permita anclar una opinión concreta con
      datos propios. EVITAR: reflexiones abstractas, frases motivacionales,
      generalizaciones. Debe sentirse como "leí este informe, esto es lo que
      veo en mi realidad" — nunca "qué difícil es ser mujer en tech".
    search_queries:
      - "women in tech report 2026"
      - "gender pay gap tech"
      - "developer hiring report"
      - "tech layoffs 2026"
      - "junior developer market"
    good_sources:
      - "stackoverflow.blog/survey"
      - "github.blog/research"
      - "developer.mozilla.org/blog"
      - "reports oficiales de la UE o INE"
    example_hooks:
      - "Salió el informe de Stack Overflow 2026. Esto es lo que coincide con mi experiencia y lo que no."
      - "Un dato del último State of JS me ha dejado tocada. Te explico por qué."
      - "Rechacé una oferta con 15k más. Ahora que llevo 6 meses sé si fue buena decisión."

# ============================================================================
# Parámetros del modelo
# ============================================================================

generation:
  model: "gemini-2.5-flash"
  temperature: 0.85
  enable_search: true
  num_slides: 5
  require_news_anchor: true   # exigir noticia real con URL y fecha
  allow_opinion_fallback: true  # si no hay noticia buena, permitir opinion piece técnico
  max_news_age_days: 14       # rechazar noticias más viejas que esto
